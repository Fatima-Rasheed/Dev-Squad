<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Calculator</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 flex items-center justify-center min-h-screen px-4">

<div class="bg-white w-full max-w-2xl rounded-3xl rounded-br-[100px] p-6 sm:p-10 shadow-xl">

  <!-- Input Section -->
  <div class="grid grid-cols-3 gap-4">

    <div>
      <label class="block text-xs font-bold tracking-widest text-gray-500 mb-1">
        DAY
      </label>
      <input id="day" type="number" placeholder="DD"
        class="w-full border rounded-md p-3 text-lg font-bold focus:ring-2 focus:ring-purple-500 outline-none">
      <p id="dayError" class="text-red-500 text-xs mt-1 hidden"></p>
    </div>

    <div>
      <label class="block text-xs font-bold tracking-widest text-gray-500 mb-1">
        MONTH
      </label>
      <input id="month" type="number" placeholder="MM"
        class="w-full border rounded-md p-3 text-lg font-bold focus:ring-2 focus:ring-purple-500 outline-none">
      <p id="monthError" class="text-red-500 text-xs mt-1 hidden"></p>
    </div>

    <div>
      <label class="block text-xs font-bold tracking-widest text-gray-500 mb-1">
        YEAR
      </label>
      <input id="year" type="number" placeholder="YYYY"
        class="w-full border rounded-md p-3 text-lg font-bold focus:ring-2 focus:ring-purple-500 outline-none">
      <p id="yearError" class="text-red-500 text-xs mt-1 hidden"></p>
    </div>

  </div>

  <!-- Divider + Button -->
  <div class="flex items-center my-8">
    <hr class="flex-1 border-gray-300">
    <button onclick="calculateAge()"
      class="bg-purple-600 hover:bg-purple-700 text-white w-14 h-14 rounded-full flex items-center justify-center -my-4 transition">
      ↓
    </button>
  </div>

  <!-- Result -->
  <div class="text-5xl sm:text-6xl font-extrabold italic space-y-2">
    <p><span id="years" class="text-purple-600">--</span> years</p>
    <p><span id="months" class="text-purple-600">--</span> months</p>
    <p><span id="days" class="text-purple-600">--</span> days</p>
  </div>

</div>

<script>

function calculateAge() {
  clearErrors();

  const day = parseInt(document.getElementById("day").value);
  const month = parseInt(document.getElementById("month").value);
  const year = parseInt(document.getElementById("year").value);

  if (!validate(day, month, year)) return;

  const birthDate = new Date(year, month - 1, day);
  const today = new Date();

  let years = today.getFullYear() - birthDate.getFullYear();
  let months = today.getMonth() - birthDate.getMonth();
  let days = today.getDate() - birthDate.getDate();

  if (days < 0) {
    months--;
    const prevMonth = new Date(today.getFullYear(), today.getMonth(), 0);
    days += prevMonth.getDate();
  }

  if (months < 0) {
    years--;
    months += 12;
  }

  animateNumber("years", years);
  animateNumber("months", months);
  animateNumber("days", days);
}

function validate(day, month, year) {
  let valid = true;
  const today = new Date();

  if (!day || day < 1 || day > 31) {
    showError("dayError", "Enter valid day");
    valid = false;
  }

  if (!month || month < 1 || month > 12) {
    showError("monthError", "Enter valid month");
    valid = false;
  }

  if (!year || year > today.getFullYear()) {
    showError("yearError", "Enter valid year");
    valid = false;
  }

  const testDate = new Date(year, month - 1, day);
  if (testDate.getDate() !== day ||
      testDate.getMonth() !== month - 1 ||
      testDate.getFullYear() !== year) {
    showError("dayError", "Invalid date");
    valid = false;
  }

  return valid;
}

function showError(id, message) {
  const el = document.getElementById(id);
  el.textContent = message;
  el.classList.remove("hidden");
}

function clearErrors() {
  ["dayError", "monthError", "yearError"].forEach(id => {
    const el = document.getElementById(id);
    el.textContent = "";
    el.classList.add("hidden");
  });
}

function animateNumber(id, finalValue) {
  const el = document.getElementById(id);
  let start = 0;
  const duration = 600;
  const increment = finalValue / (duration / 16);

  const counter = setInterval(() => {
    start += increment;
    if (start >= finalValue) {
      el.textContent = finalValue;
      clearInterval(counter);
    } else {
      el.textContent = Math.floor(start);
    }
  }, 16);
}

</script>

</body>
</html>
