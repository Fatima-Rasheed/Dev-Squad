<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Age Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="min-h-screen flex justify-center items-center bg-gray-100">
    <div class="flex justify-center items-center w-[960px] h-[550px] p-16 rounded-2xl" style="
        box-shadow:10px 0 15px -3px rgba(0, 0, 0, 0.3), -10px 0 15px -3px rgba(0, 0, 0, 0.3), 0 8px 15px -5px rgba(0, 0, 0, 0.3);">
      <div class="bg-white p-10 rounded-2xl rounded-br-[120px] shadow-xl w-full max-w-xl" >
        <div class="flex gap-6">
          <div class="flex flex-col">
            <label class="text-xs font-bold text-gray-400 mb-2">DAY</label>
            <input type="number" id="day" class="border rounded-lg p-3 w-28 font-bold text-lg"/>
            <small id="dayError" class="text-red-500 text-xs mt-1"></small>
          </div>
          <div class="flex flex-col">
            <label class="text-xs font-bold text-gray-400 mb-2">MONTH</label>
            <input type="number" id="month" class="border rounded-lg p-3 w-28 font-bold text-lg"/>
            <small id="monthError" class="text-red-500 text-xs mt-1"></small>
          </div>
          <div class="flex flex-col">
            <label class="text-xs font-bold text-gray-400 mb-2">YEAR</label>
            <input type="number" id="year" class="border rounded-lg p-3 w-28 font-bold text-lg" />
            <small id="yearError" class="text-red-500 text-xs mt-1"></small>
          </div>
        </div>
        <div class="relative my-10">
          <hr class="border-gray-300 w-[87%]" />
          <button
            onclick="calculateAge()"
            class="absolute right-0 -top-8 bg-purple-600 hover:bg-purple-700 transition text-white p-5 rounded-full shadow-lg" >
            ➜
          </button>
        </div>
        <div
          class="text-5xl md:text-6xl font-extrabold italic leading-tight space-y-2">
          <p>
            <span id="years" class="text-purple-600">--</span>
            <span>years</span>
          </p>
          <p>
            <span id="months" class="text-purple-600">--</span>
            <span>months</span>
          </p>
          <p>
            <span id="days" class="text-purple-600">--</span>
            <span>days</span>
          </p>
        </div>
      </div>
    </div>
<script src="script.js"></script>
  </body>
</html
