<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tip Calculator</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#c5e4e7] flex items-center justify-center min-h-screen">

<div class="bg-white rounded-3xl shadow-xl p-8 grid md:grid-cols-2 gap-8 w-[700px]">

<!-- LEFT SIDE -->
<div>

<label class="text-gray-600 font-semibold">Bill</label>

<input id="bill"
type="number"
placeholder="0"
class="w-full mt-2 mb-6 p-3 rounded-lg bg-gray-100 outline-none">


<label class="text-gray-600 font-semibold">Select Tip %</label>

<div class="grid grid-cols-3 gap-3 mt-3 mb-6">

<button class="tip bg-teal-800 text-white py-2 rounded-lg" data-tip="5">5%</button>
<button class="tip bg-teal-800 text-white py-2 rounded-lg" data-tip="10">10%</button>
<button class="tip bg-teal-800 text-white py-2 rounded-lg" data-tip="15">15%</button>
<button class="tip bg-teal-800 text-white py-2 rounded-lg" data-tip="25">25%</button>
<button class="tip bg-teal-800 text-white py-2 rounded-lg" data-tip="50">50%</button>

<input id="customTip"
type="number"
placeholder="Custom"
class="bg-gray-100 rounded-lg p-2 text-center">

</div>


<label class="text-gray-600 font-semibold">Number of People</label>

<input id="people"
type="number"
placeholder="0"
class="w-full mt-2 p-3 rounded-lg bg-gray-100 outline-none">

</div>


<!-- RIGHT SIDE -->
<div class="bg-teal-900 text-white rounded-2xl p-6 flex flex-col justify-between">

<div>

<div class="flex justify-between mb-6">
<div>
<p class="text-sm">Tip Amount</p>
<p class="text-xs text-gray-300">/ person</p>
</div>

<h2 id="tipPerPerson" class="text-3xl text-teal-300">$0.00</h2>
</div>


<div class="flex justify-between">
<div>
<p class="text-sm">Total</p>
<p class="text-xs text-gray-300">/ person</p>
</div>

<h2 id="totalPerPerson" class="text-3xl text-teal-300">$0.00</h2>
</div>

</div>


<button id="reset"
class="bg-teal-600 mt-8 py-3 rounded-lg text-teal-900 font-bold">
RESET
</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
