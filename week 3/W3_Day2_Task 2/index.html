<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRISTIAN MUÑOZ</title>
  <script src="https://kit.fontawesome.com/9b197449cc.js" crossorigin="anonymous"></script>

  <!-- Google Fonts: Anton (weight 400) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

  <!-- tailwind css -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      content: ["./*.{html,js}"],
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            poppins: ['"Poppins"', "sans-serif"],
            montserrat: ['"Montserrat"', "sans-serif"],
            anton: ['"Anton"', "sans-serif"],
            gotham: ['"Gotham"', "sans-serif"],
          },
          screens: {
            'xxl': '1728px',
          },
        },
      },
      plugins: [],
    };
  </script>
</head>

<body class="dark:bg-black dark:text-white text-[#292929] overflow-hidden h-screen">
  <div class="max-w-[1728px] min-w-[320px] mx-auto flex flex-col h-screen">
    <header
      class="md:h-[70px] h-[70px] px-8 lg:px-16 py-4 flex items-center justify-between md:bg-transparent dark:bg-[#0B0B0B] flex-shrink-0">
      <div class="brand flex gap-[5px]">
        <img src="./assets/logo_white.png" alt="" class="w-[26.2px] h-[26.2px] dark:inline-block hidden" />
        <img src="./assets/Group_1.png" alt="" class="w-[26.2px] h-[26.2px] dark:hidden inline-block" />
        <span class="text-xl font-bold font-poppins">tian</span>
      </div>
      <ul class="md:flex hidden items-center font-gotham gap-[30px]" id="desktopNav">
        <li><a href="#">Home</a></li>
        <li><a href="#">Portfolio</a></li>
        <li><a href="#">Skills</a></li>
        <li><a href="#">About Me</a></li>
      </ul>
      <div class="md:flex hidden items-center gap-4">
        <div
          class="w-14 rounded-[32px] flex gap-1 p-1 h-8 bg-[#051724] dark:bg-[#FFEC70] items-center justify-between cursor-pointer"
          id="themeToggler">
          <div class="flex items-center justify-center text-white" id="sun">
            <img src="./assets/sun.png" alt="" />
          </div>
          <div class="otherMode flex items-center justify-center" id="moon">
            <img src="./assets/moon_dark.png" alt="" class="w-5 h-5 hidden" />
          </div>
        </div>
        <!-- Contact Me button: black bg + white text in light, purple in dark, slight radius -->
        <a class="inline-block btn bg-black text-white dark:bg-[#925FF0] dark:text-white rounded-md px-8 py-3"
          href="#">Contact Me</a>
      </div>

      <!-- Menu Button -->
      <div class="md:hidden" id="toggleBtn">
        <i class="fa-solid fa-bars text-4xl cursor-pointer"></i>
      </div>
    </header>

    <section id="sidebar"
      class="fixed top-0 right-0 bg-white/95 dark:bg-black/95 w-[250px] h-screen pl-8 rounded-l-2xl py-5 transition-all duration-200 ease-linear md:hidden block transform translate-x-full border border-black">
      <div>
        <div class="closeSidebar mt-5">
          <i class="fa-solid fa-xmark text-4xl cursor-pointer"></i>
        </div>
      </div>
      <ul class="md:hidden flex flex-col font-gotham gap-[40px] dark:text-white text-[#292929]" id="mobileNav">
        <li><a href="#">Home</a></li>
        <li><a href="#">Portfolio</a></li>
        <li><a href="#">Skills</a></li>
        <li><a href="#">About Me</a></li>
      </ul>
    </section>

    <!-- Hero section: both sides sized equally -->
    <section class="flex items-center xl:justify-between justify-center px-[5%] xl:gap-6 2xl:gap-8 flex-1 min-h-0">

      <!-- LEFT: match the image dimensions exactly at each breakpoint -->
      <div class="left xxl:w-[840px] 2xl:w-[600px] xl:w-[520px] w-full flex flex-shrink-0">
        <div class="flex flex-col justify-center gap-2 w-full xl:items-start items-center">
          <div class="flex flex-col 2xl:gap-[18px] gap-3 w-auto">
            <div>
              <!-- PRODUCT row with sparkle icon to the right of the text -->
              <div class="flex items-center justify-center xl:justify-start gap-3 w-full relative">
                <h1
                  class="xxl:text-[210px] 2xl:text-[150px] xl:text-[130px] text-[21.6vw] leading-[90%] tracking-[-0.02em] font-anton font-normal antialiased text-center xl:text-left w-full">
                  PRODUCT
                </h1>

                <svg
                  class="absolute top-1/2 -translate-y-1/2 xl:-right-[80px] 2xl:-right-[110px] xxl:-right-[180px] xxl:w-[110px] xxl:h-[110px] 2xl:w-[95px] 2xl:h-[95px] xl:w-[85px] xl:h-[85px] flex-shrink-0 dark:fill-white fill-[#292929] hidden xl:block z-10"
                  viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                  <path d="M50 0 C50 0 53 40 100 50 C53 60 50 100 50 100 C50 100 47 60 0 50 C47 40 50 0 50 0Z" />
                </svg>
              </div>

              <h1
                class="xxl:text-[200px] 2xl:text-[143px] xl:text-[124px] text-[20.5vw] leading-[90%] tracking-[-0.02em] font-anton font-normal antialiased text-center xl:text-left w-full">
                DESIGNER
              </h1>
            </div>
            <!-- Gradient CRISTIAN MUÑOZ: pink #FA709A → yellow #FEE140 -->
            <h2
              class="font-anton xxl:text-[116px] 2xl:text-[83px] xl:text-[72px] text-[12vw] leading-[90%] tracking-[0em] text-center xl:text-left w-full"
              style="background: linear-gradient(90deg, #FA709A, #FEE140); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
              CRISTIAN MUÑOZ
            </h2>
          </div>

          <div class="flex flex-col pt-4 gap-6 w-[86.4vw] xl:w-max mx-auto xl:mx-0">
            <!-- Social icons -->
            <div class="flex items-center gap-2 justify-between xl:justify-start xl:gap-8 w-full" id="social-links">
              <!-- Instagram -->
              <a class="sm:h-[42px] sm:w-[52px] w-10 h-10 inline-flex items-center justify-center"
                href="https://www.instagram.com/" target="_blank border">
                <img src="./assets/instagram.png" alt="" class="dark:inline-block border rounded-xl  hidden">
                <img src="./assets/instagram_1.png" alt="" class="dark:hidden border rounded-xl  inline-block">
              </a>
              <!-- Figma -->
              <a class="sm:h-[50px] sm:w-[52px] w-10 h-8 inline-flex items-center justify-center"
                href="https://www.figma.com/design/velmnDGJhvY6RtJLGbrX4h/Week-3?node-id=236-13533&t=MhBSoJsC18kFzG3b-0"
                target="_blank">
                <img src="./assets/Figma.png" alt="" class="dark:inline-block border rounded-xl  hidden">
                <img src="./assets/Figma_1.png" alt="" class="dark:hidden border rounded-xl inline-block">
              </a>
              <!-- Linkedin -->
              <a class="sm:h-[52px] sm:w-[52px] w-10 h-10 inline-flex items-center justify-center"
                href="https://pk.linkedin.com/" target="_blank">
                <img src="./assets/linkedin.png" alt="" class="dark:inline-block border rounded-xl  hidden">
                <img src="./assets/linkedin_1.png" alt="" class="dark:hidden border rounded-xl  inline-block">
              </a>
              <!-- Twitter -->
              <a class="sm:h-[52px] sm:w-[52px] w-10 h-10 inline-flex items-center justify-center" href="https://x.com/"
                target="_blank">
                <img src="./assets/twitter.png" alt="" class="dark:inline-block border rounded-xl  hidden">
                <img src="./assets/twitter_1.png" alt="" class="dark:hidden border rounded-xl inline-block">
              </a>
              <!-- Telegram -->
              <a class="sm:h-[52px] sm:w-[52px] w-10 h-10 inline-flex items-center justify-center"
                href="https://telegram.org/" target="_blank">
                <img src="./assets/telegram.png" alt="" class="dark:inline-block border rounded-xl  hidden">
                <img src="./assets/telegram_1.png" alt="" class="dark:hidden border rounded-xl  inline-block">
              </a>
              <!-- Medium -->
              <a class="sm:h-[52px] sm:w-[52px] w-10 h-10 inline-flex items-center justify-center" href="#"
                target="_blank">
                <img src="./assets/Medium Logo.png" alt="" class="dark:inline-block border rounded-xl  hidden">
                <img src="./assets/Medium Logo_1.png" alt="" class="dark:hidden border rounded-xl inline-block">
              </a>
            </div>

            <!-- Download button -->
            <a class="h-[52px] w-full pl-8 pr-6 inline-flex items-center gap-2 justify-center bg-[#292929] text-white"
              id="downloadBtn" href="#" target="_blank">
              Download Curriculum Vitae
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="8" stroke-width="3" stroke-linecap="round" />
                <line x1="12" y1="11" x2="12" y2="16" />
              </svg>
            </a>
          </div>
        </div>
      </div>


      <!-- RIGHT: image with exact same dimensions as left -->
      <div class="right xl:block hidden flex-shrink-0 my-10">
        <img src="./assets/hero_img1.jpg" alt=""
          class="xxl:w-[840px] xxl:h-[620px] 2xl:w-[600px] 2xl:h-[520px] xl:w-[520px] xl:h-[450px] w-[460px] h-[400px] object-cover">
      </div>
      <script type="text/javascript" src="./script.js"></script>
</body>

</html>
